<!DOCTYPE html>
<html>
<head>
    <title>Smart Dashboard</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            width: 320px;
            text-align: center;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            margin: 15px 0;
            border-radius: 14px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        h1 {
            margin-bottom: 20px;
        }

        .title {
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 10px;
        }

        .btn-group {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
        }

        button {
            width: 45%;
            padding: 10px;
            border: none;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }

        .blue { background: #3b82f6; }
        .green { background: #22c55e; }
        .red { background: #ef4444; }
    </style>
</head>
<body>

<div class="container">

    <h1>SMART CONTROL</h1>

    <div class="card">
        <div class="title">Mode: {{data.mode}}</div>
    </div>

    <div class="card">
        <div class="title">SENSORS</div>
        <p>PIR: {{data.pir}}</p>
        <p>LDR: {{data.ldr}}</p>
    </div>

    <div class="card">
        <div class="title">LIGHT STATUS</div>
        <p>LED1: {{data.led1}}</p>
        <p>LED2: {{data.led2}}</p>
    </div>

    <div class="card">
        <div class="btn-group">
            <button class="blue" onclick="fetch('/mode').then(()=>location.reload())">AUTO</button>
            <button class="blue" onclick="fetch('/mode').then(()=>location.reload())">MANUAL</button>
        </div>

        <div class="btn-group">
            <button class="green" onclick="fetch('/on').then(()=>location.reload())">ON</button>
            <button class="red" onclick="fetch('/off').then(()=>location.reload())">OFF</button>
        </div>
    </div>

</div>

</body>
</html>
